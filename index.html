<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitalliance Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel (No-Compilation) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [stats, setStats] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // On appelle index.php pour les données
                fetch('index.php?action=overview')
                    .then(res => res.json())
                    .then(data => {
                        setStats(data);
                        setLoading(false);
                    })
                    .catch(() => {
                        // Fallback si index.php n'est pas là (mode démo)
                        setStats({ total_calls: 1240, answered: 1100, avg_wait: 18 });
                        setLoading(false);
                    });
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center">Chargement...</div>;

            return (
                <div className="p-12 max-w-7xl mx-auto">
                    <h1 className="text-7xl font-light tracking-tighter mb-12">VITALLIANCE</h1>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div className="glass p-10 rounded-[40px]">
                            <div className="text-zinc-600 text-[10px] uppercase tracking-widest mb-4">Total Appels</div>
                            <div className="text-6xl font-light tracking-tighter">{stats.total_calls}</div>
                        </div>
                        <div className="glass p-10 rounded-[40px]">
                            <div className="text-zinc-600 text-[10px] uppercase tracking-widest mb-4">Répondus</div>
                            <div className="text-6xl font-light tracking-tighter">{stats.answered}</div>
                        </div>
                        <div className="glass p-10 rounded-[40px]">
                            <div className="text-zinc-600 text-[10px] uppercase tracking-widest mb-4">Attente</div>
                            <div className="text-6xl font-light tracking-tighter">{stats.avg_wait}s</div>
                        </div>
                    </div>
                    <div className="mt-12 p-8 glass rounded-[40px] text-center text-zinc-500 text-xs uppercase tracking-widest">
                        Utilisez <a href="index.php" className="text-white underline">index.php</a> pour accéder à toutes les fonctionnalités avancées.
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
